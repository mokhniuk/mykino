server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Pre-rendered landing page for web crawlers / social media scrapers
    location = / {
        try_files /landing.html /index.html;
    }

    # Localized root paths (e.g., /ua, /de)
    location ~ ^/(ua|de|cs|pl|pt|hr|it|es)/?$ {
        try_files $uri/index.html /index.html;
    }

    # SPA routing — send all unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets get long-lived cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;
}
