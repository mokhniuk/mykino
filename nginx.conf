server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — send all unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets get long-lived cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;
}
